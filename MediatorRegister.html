<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Mediator Register</title>

  <style>
    *{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
    body{margin:0;background:#f4f6f8;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:white;width:440px;max-width:92%;padding:32px;border-radius:22px;box-shadow:0 18px 50px rgba(0,0,0,.16)}
    h1{color:#4c1d95;margin:0 0 8px}
    p{color:#6b7280;line-height:1.5}
    label{display:block;margin:14px 0 7px;font-weight:700;color:#374151}
    input{width:100%;padding:13px;border:1px solid #d1d5db;border-radius:12px}
    .btn{width:100%;border:0;border-radius:12px;padding:13px;font-weight:800;cursor:pointer;margin-top:12px}
    .primary{background:#16a34a;color:white}
    .link{background:#f3f4f6;color:#111827}
    .ok{color:#16a34a;font-weight:800;margin-top:12px;line-height:1.5}
    .error{color:#dc2626;font-weight:800;margin-top:12px;line-height:1.5}
    .info{background:#eef2ff;color:#3730a3;border-left:5px solid #6366f1;padding:12px;border-radius:12px;margin-top:14px;font-weight:800;line-height:1.5}
  
/* === Premium Surya Teja UI Refresh: visual-only overrides === */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap');
:root{
  --gold:#c9a84c!important;--gold-light:#e8d08a!important;--gold-bg:rgba(201,168,76,.10)!important;
  --cream:#faf6ef!important;--cream2:#f5f0e8!important;--dark:#1a1208!important;--dark2:#2d2010!important;
  --dark3:#4a3728!important;--muted:#7a6a58!important;--green:#2d6a4f!important;--green-light:#52b788!important;
  --red:#a4262c!important;--surface:#fffdf8!important;--line:rgba(201,168,76,.22)!important;
  --border:rgba(201,168,76,.22)!important;--shadow:0 20px 55px rgba(26,18,8,.12)!important;--radius:22px!important;
}
*{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif!important;}
body{
  background:radial-gradient(ellipse at 15% 0%,rgba(201,168,76,.18),transparent 38%),radial-gradient(ellipse at 85% 10%,rgba(45,106,79,.14),transparent 36%),linear-gradient(180deg,#fffaf0 0%,var(--cream) 100%)!important;
  color:var(--dark)!important;
}
h1,h2,h3,.brand-box h1,.brand,.topbar h1,.topbar-title,.section-title,.product-name,.card h2,.card-title{
  font-family:'Playfair Display',serif!important;letter-spacing:-.025em!important;color:var(--dark)!important;
}
.sidebar{
  background:linear-gradient(175deg,#1a1208 0%,#2a1e0e 58%,#1a2d1f 100%)!important;
  border:1px solid rgba(201,168,76,.22)!important;border-radius:28px!important;box-shadow:0 34px 85px rgba(26,18,8,.22)!important;
}
.brand-box,.sidebar .brand{border-bottom-color:rgba(201,168,76,.22)!important;}
.brand-box h1,.sidebar .brand h1,.brand{color:#fff!important;}
.brand-box h1 span,.sidebar .brand h1 span,.brand span{color:var(--gold)!important;}
.brand-box img{filter:drop-shadow(0 18px 34px rgba(0,0,0,.28))!important;}
.menu-title,.submenu-title{color:rgba(255,255,255,.36)!important;letter-spacing:.16em!important;text-transform:uppercase!important;font-weight:700!important;}
.menu button,.submenu button,.sidebar a,.nav-link{
  border-radius:14px!important;color:rgba(255,255,255,.68)!important;transition:all .18s ease!important;
}
.menu button:hover,.menu button.active,.submenu button:hover,.submenu button.active,.nav-link:hover,.nav-link.active{
  background:rgba(201,168,76,.14)!important;color:var(--gold-light)!important;transform:translateX(2px);
}
.main{background:transparent!important;}
.topbar,.section,.card,.summary-card,.product-card,.structured-order-preview{
  background:rgba(255,253,248,.94)!important;border:1px solid rgba(201,168,76,.18)!important;border-radius:24px!important;box-shadow:var(--shadow)!important;backdrop-filter:blur(18px)!important;
}
.topbar{padding:24px 28px!important;}
.section-title{font-size:clamp(24px,3vw,34px)!important;}
.summary-card,.product-card,.card{transition:transform .18s ease,box-shadow .18s ease!important;}
.summary-card:hover,.product-card:hover,.card:hover{transform:translateY(-2px);box-shadow:0 26px 65px rgba(26,18,8,.15)!important;}
button,.btn,.update-btn,.secondary-btn,.mini-btn,.edit-btn,.download-link,.print-link,.whatsapp-link,.notification-enable-btn{
  border-radius:14px!important;font-weight:700!important;transition:all .18s ease!important;
}
button:hover,.btn:hover,.update-btn:hover,.secondary-btn:hover,.mini-btn:hover,.edit-btn:hover,.download-link:hover,.print-link:hover,.whatsapp-link:hover{transform:translateY(-1px);filter:brightness(1.04);}
.update-btn,.btn.save,.btn.approve,.primary,.notification-enable-btn{background:var(--green)!important;color:#fff!important;border:0!important;}
.secondary-btn,.mini-btn,.link,.download-link,.print-link{background:var(--gold-bg)!important;color:var(--dark)!important;border:1px solid rgba(201,168,76,.28)!important;}
.whatsapp-link{background:#ecf7f1!important;color:var(--green)!important;border:1px solid rgba(45,106,79,.18)!important;}
.btn.reject,.cancel-btn{background:#fdf2f2!important;color:var(--red)!important;border:1px solid rgba(164,38,44,.18)!important;}
input,select,textarea{
  border:1px solid #e6ddcf!important;border-radius:14px!important;background:#fff!important;color:var(--dark)!important;outline:none!important;
}
input:focus,select:focus,textarea:focus{border-color:var(--gold)!important;box-shadow:0 0 0 4px rgba(201,168,76,.15)!important;}
table{border-collapse:separate!important;border-spacing:0!important;background:#fff!important;}
thead tr{background:var(--cream2)!important;}
th{color:var(--muted)!important;letter-spacing:.08em!important;text-transform:uppercase!important;font-size:11px!important;border-bottom:1px solid #ede8e0!important;}
td{border-bottom:1px solid rgba(26,18,8,.05)!important;color:var(--dark3)!important;}
tbody tr:hover td{background:#faf8f4!important;}
.status,.status-badge,.badge,.live-badge{border-radius:999px!important;font-weight:800!important;letter-spacing:.02em!important;}
.status.approved,.badge.approved,.badge.accepted{background:#ecf7f1!important;color:var(--green)!important;}
.status.pending,.badge.pending,.live-badge{background:#fff8ec!important;color:#92540a!important;}
.status.rejected,.badge.rejected{background:#fdf2f2!important;color:var(--red)!important;}
.success,.success-msg{background:#ecf7f1!important;color:var(--green)!important;border-left:4px solid var(--green-light)!important;}
.error{background:#fdf2f2!important;color:var(--red)!important;border-left:4px solid var(--red)!important;}
.product-image img{filter:drop-shadow(0 22px 38px rgba(26,18,8,.16))!important;}
@media(max-width:900px){
  .sidebar{position:relative!important;top:auto!important;left:auto!important;bottom:auto!important;width:auto!important;margin:12px!important;}
  .main{margin-left:0!important;padding:12px 14px 32px!important;}
  .topbar{flex-direction:column!important;gap:12px!important;}
  .cards,.rate-grid,.form-grid,.structured-order-grid{grid-template-columns:1fr!important;}
  table{min-width:760px;}
}
@media(max-width:560px){
  body{padding:0!important;}
  .section,.card,.topbar,.summary-card,.product-card{border-radius:18px!important;padding:18px!important;}
  .brand-box img{width:160px!important;}
}

</style>
</head>

<body>
  <div class="card">

    <h1>Mediator Registration</h1>
    <p>Register your company details. Staff approval is mandatory before login access is enabled.</p>

    <label>Mobile Number</label>
    <input id="mobile" placeholder="Enter mobile number" maxlength="10" inputmode="numeric" autocomplete="tel">

    <label>Company Name</label>
    <input id="companyName" placeholder="Enter company name" autocomplete="organization">

    <label>Password</label>
    <input id="password" type="password" placeholder="Create password" autocomplete="new-password">

    <label>Confirm Password</label>
    <input id="confirmPassword" type="password" placeholder="Confirm password" autocomplete="new-password">

    <div class="info">
      After registration, Surya Teja Rice Industries team will call you and verify your details as a second verification process.
    </div>

    <button class="btn primary" onclick="registerMediator()">Submit Registration</button>
    <button class="btn link" onclick="location.href='index.html'">Back to Home Screen</button>

    <div id="msg"></div>

  </div>

<script>
  function safeParse(key, fallback){try{return JSON.parse(localStorage.getItem(key)||JSON.stringify(fallback));}catch(e){return fallback;}}
  function sanitizeText(value){return String(value||'').replace(/[<>]/g,'').trim().slice(0,120);}
  function getMediators(){
    return safeParse('mediators', []);
  }

  function saveMediators(data){
    localStorage.setItem('mediators', JSON.stringify(data));
  }

  function getNotifications(){
    return safeParse('notifications', []);
  }

  function saveNotifications(data){
    localStorage.setItem('notifications', JSON.stringify(data));
  }

  function isValidMobile(mobile){
    return /^[6-9][0-9]{9}$/.test(mobile);
  }

  function setMessage(type, text){
    const msg = document.getElementById('msg');
    msg.className = type || '';
    msg.innerText = text || '';
  }

  async function registerMediator(){
    const mobile = document.getElementById('mobile').value.trim();
    const companyName = sanitizeText(document.getElementById('companyName').value);
    const password = document.getElementById('password').value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value.trim();
    const submitBtn = document.querySelector('.btn.primary');

    setMessage('', '');

    if(!mobile){
      setMessage('error', 'Mobile number is mandatory.');
      return;
    }

    if(!companyName){
      setMessage('error', 'Company name is mandatory.');
      return;
    }

    if(!password){
      setMessage('error', 'Password is mandatory.');
      return;
    }

    if(!confirmPassword){
      setMessage('error', 'Please confirm your password.');
      return;
    }

    if(!isValidMobile(mobile)){
      setMessage('error', 'Please enter a valid 10-digit Indian mobile number.');
      return;
    }

    if(password.length < 6){
      setMessage('error', 'Password must be at least 6 characters.');
      return;
    }

    if(password !== confirmPassword){
      setMessage('error', 'Password and confirm password do not match.');
      return;
    }

    if(typeof supabaseClient === 'undefined'){
      setMessage('error', 'Supabase connection not found. Please check supabase.js.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerText = 'Submitting...';

    try{
      const { data: existingMediator, error: checkError } = await supabaseClient
        .from('mediators')
        .select('mobile')
        .eq('mobile', mobile)
        .maybeSingle();

      if(checkError){
        setMessage('error', 'Unable to verify mobile number. Please try again.');
        return;
      }

      if(existingMediator){
        setMessage('error', 'This mobile number is already registered.');
        return;
      }

      const { error: insertError } = await supabaseClient
        .from('mediators')
        .insert([{
          company_name: companyName,
          mobile: mobile,
          password: password,
          status: 'Pending Approval',
          verification_status: 'Pending Call Verification'
        }]);

      if(insertError){
        if(String(insertError.message || '').toLowerCase().includes('duplicate')){
          setMessage('error', 'This mobile number is already registered.');
        }else{
          setMessage('error', insertError.message || 'Registration failed. Please try again.');
        }
        return;
      }

      await supabaseClient
        .from('notifications')
        .insert([{
          type: 'Mediator Registration',
          message: 'New mediator registered: ' + companyName + ' (' + mobile + '). Call verification required before approval.',
          company_name: companyName,
          mobile: mobile,
          status: 'Unread'
        }]);

      setMessage(
        'ok',
        'Registration submitted successfully. Surya Teja Rice Industries team will call you and verify your details as a second verification process. Please wait for staff approval.'
      );

      document.getElementById('mobile').value = '';
      document.getElementById('companyName').value = '';
      document.getElementById('password').value = '';
      document.getElementById('confirmPassword').value = '';

    }catch(error){
      setMessage('error', 'Registration failed. Please check internet connection and try again.');
    }finally{
      submitBtn.disabled = false;
      submitBtn.innerText = 'Submit Registration';
    }
  }</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</body>
</html>
